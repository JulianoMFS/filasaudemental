name: CI — Fila Saúde Mental

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  qualidade:
    name: Lint + Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint com Ruff
        run: |
          ruff check src/ tests/

      - name: Testes unitários e de integração (mock)
        run: |
          pytest tests/ -v --ignore=tests/test_integracao_real.py \
            -m "not integration" \
            --tb=short

      - name: Testes de integração REAL (rede habilitada)
        run: |
          pytest tests/test_integracao.py -v \
            -m integration \
            --tb=short
        # Os testes de integração real são executados separadamente
        # para facilitar diagnóstico em caso de falha de rede no CI.
        continue-on-error: false
