        nome=nome,
        cpf=cpf,
        idade=idade,
        classificacao=classificacao,
        demanda=demanda,
        regiao_saude=regiao_saude_sugerida,   # campo novo no modelo
        cep=dados_endereco.get("cep", ""),     # campo novo no modelo
    )
"""

